<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POSEIDON Tagger</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <header class="app-header">
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <path d="M12 2C6.48 2 2 6.48 2 12C2 17.52 6.48 22 12 22C17.52 22 22 17.52 22 12C22 6.48 17.52 2 12 2ZM12 20C7.59 20 4 16.41 4 12C4 7.59 7.59 4 12 4C16.41 4 20 7.59 20 12C20 16.41 16.41 20 12 20Z" fill="#ea580c"/>
                <path d="M12 17C14.7614 17 17 14.7614 17 12C17 9.23858 14.7614 7 12 7C9.23858 7 7 9.23858 7 12C7 14.7614 9.23858 17 12 17Z" fill="#ea580c"/>
            </svg>
            <h1>POSEIDON <span>Tagger</span></h1>
        </div>
    </header>

    <div class="main-layout">
        <main class="content-area">
            <div class="input-card">
                <h2>Input Sentence</h2>
                <form id="tagForm">
                    <div class="input-wrapper">
                        <textarea id="sentenceInput" placeholder="Enter or paste your sentence here..." required autocomplete="off" rows="3"></textarea>
                    </div>
                    <div class="actions">
                        <button type="submit" id="submitBtn" class="primary-btn">
                            <span class="btn-text">Tag Sentence</span>
                        </button>
                        <button type="button" id="clearBtn" class="secondary-btn">Clear</button>
                    </div>
                </form>
            </div>

            <div class="results-section hidden" id="resultsSection">
                <h2>Tagged Output</h2>
                <p class="subtitle">Your analyzed sentence breakdown:</p>
                <div class="tags-container" id="tagsContainer">
                    <!-- Results dynamically inserted here -->
                </div>
            </div>
            
            <div class="error-message hidden" id="errorMessage"></div>
        </main>

        <aside class="sidebar">
            <div class="legend-card">
                <h3>Tag Legend</h3>
                <ul class="legend-list">
                    <li><span class="legend-dot noun"></span> Noun (NN, NP)</li>
                    <li><span class="legend-dot verb"></span> Verb (VB, VBD)</li>
                    <li><span class="legend-dot adj"></span> Adjective (JJ)</li>
                    <li><span class="legend-dot adv"></span> Adverb (RB)</li>
                    <li><span class="legend-dot pron"></span> Pronoun (PPS)</li>
                    <li><span class="legend-dot prep"></span> Preposition (IN)</li>
                    <li><span class="legend-dot det"></span> Determiner (DT, AT)</li>
                    <li><span class="legend-dot conj"></span> Conjunction (CC)</li>
                    <li><span class="legend-dot other"></span> Other</li>
                </ul>
            </div>
        </aside>
    </div>

    <script src="script.js"></script>
</body>
</html>
